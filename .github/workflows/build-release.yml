name: Build & Publish Release AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode keystore and write keystore.properties
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > keystore.jks
          cat > keystore.properties << EOF
          storeFile=../keystore.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

      - name: Build signed release AAB
        run: ./gradlew bundleRelease
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kidfocus-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build signed release APK (for direct install / testing)
        run: ./gradlew assembleRelease
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kidfocus-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
